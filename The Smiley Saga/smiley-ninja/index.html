<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../universal-files/styles.css">
    <link rel="icon" href="../images/little-smiley.ico" type="image/x-icon">
    <title>the smiley can fly</title>
</head>
<body>
    <style>
        #score {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 36px;
            color: black;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            margin: 0;
        }

        #hscore {
            position: absolute;
            top: 48px;
            right: 16px;
            font-size: 24px;
            color: rgb(71, 71, 71);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
            margin: 0;
        }
    </style>
    <p id="score">0</p>
    <p id="hscore">0</p>
    <p id="info">Click on the smileys as they are launched into the air</p>
    <canvas id="game"></canvas>
    <script src="script.js"></script>
</body>
</html>
